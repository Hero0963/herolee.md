<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Lee | ML Workshop</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #238636; /* GitHub 綠色 */
            --card-bg: #161b22;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            margin: 0 auto 20px;
            background-image: url('https://github.com/Hero0963.png'); 
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #8b949e;
            margin-bottom: 45px;
            font-size: 0.95rem;
        }

        /* --- 核心呼吸發光按鈕 --- */
        .main-link {
            display: block;
            padding: 20px;
            background-color: var(--accent-color);
            color: #ffffff;
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            /* 啟動呼吸燈動畫 */
            animation: pulse-green 2.5s infinite;
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.7);
            }
            70% {
                box-shadow: 0 0 0 18px rgba(35, 134, 54, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(35, 134, 54, 0);
            }
        }

        .main-link:hover {
            transform: translateY(-4px) scale(1.02);
            background-color: #2ea043;
            animation: none; /* 滑鼠移上去時停止閃爍，維持強光 */
            box-shadow: 0 10px 30px rgba(35, 134, 54, 0.6);
        }

        .main-link:active {
            transform: translateY(-1px);
        }

        footer {
            margin-top: 80px;
            font-size: 0.75rem;
            color: #484f58;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar"></div>
        
        <h1>Hero Lee</h1>
        <p class="subtitle">Machine Learning Enthusiast</p>
        
        <a href="https://github.com/Hero0963/ml-workshop" class="main-link">
            進入 ML Workshop →
        </a>
        
        <footer>
            HEROLEE.MD &copy; 2026
        </footer>
    </div>

</body>
</html>
