<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Lee | Developer & ML Enthusiast</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --card-bg: #161b22;
            --border-color: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--border-color);
            margin-bottom: 20px;
            /* 如果有大頭貼，把下面的 URL 換成你的照片網址 */
            background-image: url('https://github.com/Hero0963.png'); 
            background-size: cover;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: #ffffff;
        }
        p.subtitle {
            font-size: 1rem;
            color: #8b949e;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-card {
            display: block;
            padding: 18px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
        }
        .link-card:hover {
            border-color: var(--accent-color);
            background-color: #1f242c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(88, 166, 255, 0.1);
        }
        .link-card span {
            color: var(--accent-color);
            margin-right: 8px;
            font-weight: bold;
        }
        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar"></div>
        <h1>Hero Lee</h1>
        <p class="subtitle">Building models & breaking things.</p>
        
        <div class="links">
            <a href="#" class="link-card" target="_blank"><span>></span> About Me (LinkedIn)</a>
            <a href="https://github.com/Hero0963" class="link-card" target="_blank"><span>></span> My Projects (GitHub)</a>
            <a href="/ml" class="link-card"><span>></span> ML Workshop</a>
        </div>
        
        <footer>
            &copy; 2026 Hero Lee. Powered by herolee.md
        </footer>
    </div>
</body>
</html>
