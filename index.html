<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Lee | ML Workshop</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #238636; /* GitHub 綠 */
            --card-bg: #161b22;
            --border-color: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            margin: 0 auto 20px;
            background-image: url('https://github.com/Hero0963.png'); 
            background-size: cover;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: #ffffff; }
        p.subtitle { color: #8b949e; margin-bottom: 40px; font-size: 0.9rem; }
        
        /* --- 這裡是你的發光按鈕 CSS --- */
        .main-link {
            display: block;
            padding: 20px;
            background-color: var(--accent-color);
            color: #ffffff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            /* 呼吸燈動畫 */
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(35, 134, 54, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(35, 134, 54, 0);
            }
        }

        .main-link:hover {
            transform: translateY(-3px) scale(1.02);
            background-color: #2ea043;
            animation: none; /* 滑鼠移上去停止閃爍 */
            box-shadow: 0 8px 25px rgba(35, 134, 54, 0.6);
        }
        /* ---------------------------- */

        footer { margin-top: 60px; font-size: 0.75rem; color: #484f58; letter-spacing: 1px; }
    </style>
</head>
